<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Aperture ring (camera lens / viewfinder) -->
  <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5"/>

  <!-- Body contour: a single gestural line suggesting a woman's pose
       (crown → forehead → chin → neck → shoulder, contrapposto flow) -->
  <path
    d="M 20 11
       C 23.5 9, 27 11.5, 27 15.5
       C 27 18.5, 24.5 20.5, 24 22.5
       C 23.5 24.5, 25 26, 26.5 27
       C 29 29, 32 32, 34 36
       C 35.5 39, 35.5 41, 34.5 42"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Blush accent dot (aperture center / focal point / beauty mark) -->
  <circle cx="24" cy="24" r="2" fill="#c9806a"/>
</svg>
